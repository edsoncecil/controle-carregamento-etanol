<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Controle de Carregamento</title>
    <style>
        :root {
            --bg: #f2f5f8;
            --card: #ffffff;
            --line: #d6dde6;
            --text: #102235;
            --title-dark: #073b4c;
            --title-mid: #0f6c89;
            --title-soft: #31a8c7;
            --primary: #0e7490;
            --primary-dark: #0b556a;
            --secondary: #334155;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: "Bahnschrift", "Trebuchet MS", "Segoe UI", sans-serif;
            background: radial-gradient(circle at 0% 0%, #dff4f8 0%, transparent 35%),
                        radial-gradient(circle at 100% 100%, #e9ecff 0%, transparent 30%),
                        var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 14px;
            box-shadow: 0 10px 26px rgba(15, 35, 56, 0.08);
            width: 100%;
            max-width: 400px;
            overflow: hidden;
        }

        .login-header {
            background: linear-gradient(120deg, var(--title-dark) 0%, var(--title-mid) 52%, var(--title-soft) 100%);
            padding: 40px 40px 30px;
            text-align: center;
        }

        .login-header h1 {
            margin: 0;
            color: #f0fbff;
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 0.02em;
        }

        .login-header p {
            margin: 8px 0 0;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
        }

        .login-body {
            padding: 40px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #0f3a55;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--line);
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(14, 116, 144, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(120deg, var(--title-dark) 0%, var(--title-mid) 52%, var(--title-soft) 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(14, 116, 144, 0.3);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .error-message {
            background: #fee;
            border: 1px solid #f88;
            color: #c00;
            padding: 12px 16px;
            margin-bottom: 24px;
            border-radius: 8px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>Controle de Carregamento</h1>
            <p>Faça login para continuar</p>
        </div>
        <div class="login-body">
            {% if form.errors %}
                <div class="error-message">
                    Usuário ou senha incorretos. Tente novamente.
                </div>
            {% endif %}
            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label for="id_username">Usuário</label>
                    <input type="text" name="username" id="id_username" required autofocus>
                </div>
                <div class="form-group">
                    <label for="id_password">Senha</label>
                    <input type="password" name="password" id="id_password" required>
                </div>
                <button type="submit" class="btn-login">Entrar</button>
            </form>
        </div>
    </div>
</body>
</html>
